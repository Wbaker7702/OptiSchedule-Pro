version: "3.9"

services:
  server:
    build: ./server
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
    depends_on:
      - db

  client:
    build: ./client
    ports:
      - "3000:80"
    depends_on:
      - server

  db:
    image: postgres:15
    environment:
      POSTGRES_USER: opti
      POSTGRES_PASSWORD: optipass
      POSTGRES_DB: optischedule
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
