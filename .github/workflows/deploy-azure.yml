name: Deploy to Azure (gated by Trust Score)

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  security-events: read
  actions: read

env:
  TRUST_THRESHOLD: "75"
  # Set these as repo Variables (Settings → Secrets and variables → Actions → Variables)
  AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
  AZURE_CONTAINERAPP_NAME: ${{ vars.AZURE_CONTAINERAPP_NAME }}
  IMAGE: ghcr.io/${{ github.repository }}:latest

jobs:
  trust:
    runs-on: ubuntu-latest
    outputs:
      score: ${{ steps.read.outputs.score }}
    steps:
      - uses: actions/checkout@v4
      - name: Read Trust Score from file
        id: read
        run: |
          if [ -f TRUST_BADGE.md ]; then
            SCORE=$(grep -o '[0-9]\+' TRUST_BADGE.md | head -1)
          else
            SCORE=0
          fi
          echo "score=$SCORE" >> "$GITHUB_OUTPUT"
          echo "Trust Score = $SCORE"

  deploy:
    needs: trust
    runs-on: ubuntu-latest
    if: needs.trust.outputs.score >= env.TRUST_THRESHOLD
    environment:
      name: production

    steps:
      - uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure Container Apps
        uses: azure/container-apps-deploy-action@v2
        with:
          resourceGroup: ${{ env.AZURE_RESOURCE_GROUP }}
          containerAppName: ${{ env.AZURE_CONTAINERAPP_NAME }}
          imageToDeploy: ${{ env.IMAGE }}
