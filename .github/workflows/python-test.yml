name: OptiSchedule Pro CI on: push: 
    branches: [ "main" ]
  pull_request: branches: [ "main" ] 
jobs:
  test: runs-on: ubuntu-latest steps: 
      - uses: actions/checkout@v4
      
      - name: Set up Python uses: 
        actions/setup-python@v5 with:
          python-version: '3.12'
          
      - name: Install dependencies 
        run: |
          python -m pip install 
          --upgrade pip pip install 
          openpyxl pandas
          
      - name: Pre-check environment 
        run: |
          # Ensure template exists for 
          # the test
          [ -f template.xlsx ] || 
          python -c "import openpyxl; 
          wb = openpyxl.Workbook(); 
          wb.save('template.xlsx')"
          
      - name: Run unit tests run: | 
          python -m unittest 
          test_run.py
